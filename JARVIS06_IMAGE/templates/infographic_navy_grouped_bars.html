<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, initial-scale=1">
<title>{TITLE}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap');

  :root{
    --hero0:#0b1130;
    --hero1:#141b42;
    --ink:#f4f6ff;
    --a1:#ff2f8f;
    --a1s:#ffb3d9;
    --a2:#2158ff;
    --a2s:#9db8ff;
    --soft:#ffffff;
    --muted:#7a82a8;
    --eyebrow:#ffcc33;
    --grid:rgba(255,255,255,.14);
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html,body{
    width:1280px;
    background:var(--hero0);
    font-family:'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  .canvas{ width:1280px; margin:0 auto; }

  .hero-stats:empty,
  .mini-cards:empty{ display:none; }

  section:has([data-jarvis-empty]){ display:none; }

  /* ============================================================
     1. 상단 히어로 풀밴드 — 전체 높이 약 53%, 완전 플랫 네이비
        (그리드·점무늬·글로우 없음 — 단색 배경만)
     ============================================================ */
  .hero{
    width:100%;
    min-height:636px;
    background:var(--hero0);
    padding:60px 72px 40px;
    display:flex;
    flex-direction:column;
  }

  .eyebrow{
    flex:0 0 auto;
    font-size:14px;
    font-weight:700;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--eyebrow);
    margin:0 0 20px;
  }
  .eyebrow:empty{ display:none; margin:0; }

  /* ------------------------------------------------------------
     6-카테고리 그룹 막대그래프 (CHART_1) — 단일 행 균등 배분.
     카드 패널 없음 — 막대 자체가 정보 단위. 막대 내부에는
     마젠타=도트 패턴(.bar-a1), 블루=사선 패턴(.bar-a2) 텍스처.
     최고/최저값은 손글씨풍 화살표 콜아웃(.callout)으로 강조.

     주입 마크업 예시 (카테고리 6개 반복):
       <div class="bar-row">
         <div class="bar-cat">
           <div class="bar-plot">
             <div class="callout" style="left:50%;top:-6px;">
               <svg class="callout-arrow" width="30" height="44" viewBox="0 0 30 44">
                 <path d="M15 42 C4 30, 24 18, 13 4" fill="none" stroke="var(--eyebrow)"
                       stroke-width="2.4" stroke-linecap="round" stroke-dasharray="1 7"/>
                 <path d="M13 4 L7 10 M13 4 L9 12" stroke="var(--eyebrow)" stroke-width="2.4"
                       stroke-linecap="round" fill="none"/>
               </svg>
               <span class="bubble">최고 32.4%</span>
             </div>
             <div class="bar-pair">
               <div class="bar bar-a1" style="--h:72%"></div>
               <div class="bar bar-a2" style="--h:54%"></div>
             </div>
           </div>
           <div class="bar-cap">
             <span class="cap-icon">🛒</span>
             <span class="cap-label">카테고리명</span>
           </div>
         </div>
         <!-- 총 6개 반복 -->
       </div>
  ------------------------------------------------------------- */
  .chart-slot--hero{ flex:1 1 auto; height:502px; display:flex; }

  .bar-row{
    width:100%;
    height:100%;
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:18px;
  }

  .bar-cat{
    flex:1 1 0;
    min-width:0;
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .bar-plot{
    flex:1 1 auto;
    min-height:0;
    width:100%;
    position:relative;
    display:flex;
    align-items:flex-end;
    justify-content:center;
  }

  .bar-pair{
    height:100%;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    gap:8px;
  }

  .bar{
    width:34px;
    height:var(--h, 50%);
    border-radius:6px 6px 2px 2px;
  }
  .bar-a1{
    background-color:var(--a1);
    background-image:radial-gradient(circle, var(--a1s) 1.4px, transparent 1.6px);
    background-size:10px 10px;
  }
  .bar-a2{
    background-color:var(--a2);
    background-image:repeating-linear-gradient(135deg,
      var(--a2s) 0, var(--a2s) 2px, transparent 2px, transparent 8px);
  }

  .bar-cap{
    flex:0 0 auto;
    margin-top:14px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
  }
  .cap-icon{
    width:34px;
    height:34px;
    border-radius:9px; /* 라운드 사각형 — 원형 금지 */
    background:var(--hero1);
    border:1.5px solid var(--grid);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:16px;
  }
  .cap-label{
    font-size:14px;
    font-weight:600;
    color:var(--ink);
    text-align:center;
    line-height:1.3;
    max-width:96px;
  }

  /* 최고/최저 콜아웃 — 손글씨풍 화살표 + 말풍선 */
  .callout{
    position:absolute;
    display:flex;
    flex-direction:column;
    align-items:center;
    transform:translateX(-50%);
    z-index:2;
  }
  .callout-arrow{ overflow:visible; display:block; }
  .callout .bubble{
    font-size:14px;
    font-weight:700;
    color:var(--ink);
    background:var(--hero1);
    border:1.5px solid var(--eyebrow);
    border-radius:20px;
    padding:6px 16px;
    white-space:nowrap;
  }

  /* ============================================================
     2. 중앙 화이트 텍스트 밴드 — 전체 높이 약 22%
        상하 골드/옐로우 얇은 구분선으로 네이비 영역과 균형
     ============================================================ */
  .text-band{
    width:100%;
    min-height:264px;
    background:var(--soft);
    border-top:4px solid var(--eyebrow);
    border-bottom:4px solid var(--eyebrow);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:40px 130px;
  }
  .title{
    font-size:36px;
    font-weight:900;
    line-height:1.32;
    letter-spacing:-.01em;
    color:var(--hero0);
    max-width:900px;
    margin:0 0 14px;
  }
  .title:empty{ display:none; margin:0; }
  .subtitle{
    font-size:16px;
    font-weight:400;
    line-height:1.75;
    color:var(--muted);
    max-width:760px;
    margin:0;
  }
  .subtitle:empty{ display:none; }

  /* ============================================================
     3. 하단 네이비 밴드 — 전체 높이 약 25%, 완전 플랫
     ============================================================ */
  .bottom-band{
    width:100%;
    min-height:300px;
    background:var(--hero1);
    padding:44px 72px 32px;
    display:flex;
    flex-direction:column;
  }

  /* 히어로 수치 — 카드 없는 플랫 숫자 스트립 */
  .hero-stats{
    display:flex;
    flex-wrap:wrap;
    gap:48px;
    margin-bottom:30px;
  }
  .hero-stats:empty{ display:none; margin:0; }
  .hero-stats .stat{ display:flex; flex-direction:column; gap:4px; }
  .hero-stats .stat .num{ font-size:30px; font-weight:900; color:var(--ink); line-height:1; }
  .hero-stats .stat .lbl{ font-size:14px; color:var(--muted); }

  /* 3열 — 보조 차트(CHART_2) / 미니카드 리스트(MINI_CARDS) / 보조 차트(CHART_3) */
  .bottom-grid{
    flex:1;
    display:grid;
    grid-template-columns:1fr 1.3fr 1fr;
    gap:32px;
    align-items:center;
  }

  .chart-slot--mini{
    height:150px;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  /* 주입 마크업 예시(반복):
       <div class="row">
         <span class="dot" style="background:var(--a1)"></span>
         <span class="txt">라벨</span>
         <span class="val">42%</span>
       </div>
  */
  .mini-cards{
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .mini-cards:empty{ display:none; }
  .mini-cards .row{ display:flex; align-items:center; gap:12px; }
  .mini-cards .row .dot{ width:10px; height:10px; border-radius:3px; flex-shrink:0; }
  .mini-cards .row .txt{ font-size:14px; color:var(--ink); }
  .mini-cards .row .val{ font-size:14px; font-weight:700; color:var(--muted); margin-left:auto; }

  .foot{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    gap:24px;
    margin-top:28px;
    padding-top:16px;
    border-top:1px solid var(--grid);
  }
  .foot:not(:has(.source:not(:empty))):not(:has(.brand:not(:empty))){ display:none; }
  .source{ font-size:13px; color:var(--muted); }
  .source:empty{ display:none; }
  .brand{ font-size:13px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--eyebrow); }
  .brand:empty{ display:none; }
</style>
</head>
<body>

  <svg width="0" height="0" style="position:absolute;overflow:hidden" aria-hidden="true">
    <defs>
      <pattern id="barPatternDot" width="10" height="10" patternUnits="userSpaceOnUse">
        <rect width="10" height="10" fill="var(--a1)"/>
        <circle cx="2.4" cy="2.4" r="1.4" fill="var(--a1s)"/>
      </pattern>
      <pattern id="barPatternDiag" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(135)">
        <rect width="8" height="8" fill="var(--a2)"/>
        <line x1="0" y1="0" x2="0" y2="8" stroke="var(--a2s)" stroke-width="2.6"/>
      </pattern>
    </defs>
  </svg>

  <div class="canvas">

    <section class="hero">
      <p class="eyebrow">{EYEBROW}</p>
      <section class="chart-slot chart-slot--hero">{CHART_1}</section>
    </section>

    <section class="text-band">
      <h1 class="title">{TITLE}</h1>
      <p class="subtitle">{SUBTITLE}</p>
    </section>

    <section class="bottom-band">
      <div class="hero-stats">{HERO_STATS}</div>

      <div class="bottom-grid">
        <section class="chart-slot chart-slot--mini">{CHART_2}</section>
        <div class="mini-cards">{MINI_CARDS}</div>
        <section class="chart-slot chart-slot--mini">{CHART_3}</section>
      </div>

      <footer class="foot">
        <span class="source">{SOURCE}</span>
        <span class="brand">{BRAND}</span>
      </footer>
    </section>

  </div>

</body>
</html>
