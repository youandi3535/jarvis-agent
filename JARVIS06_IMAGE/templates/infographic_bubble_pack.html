<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, initial-scale=1">
<title>{TITLE}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap');

  :root{
    --hero0:#EAF6F7;
    --hero1:#DCEEF1;
    --ink:#26221D;
    --a1:#4FA6AD;
    --a1s:#CFEBEC;
    --a2:#D2662E;
    --a2s:#F5DBC4;
    --soft:#F4F1EA;
    --muted:#8C8478;
    --eyebrow:#B9773D;
    --grid:#E2DBCC;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html,body{
    width:1280px;
    background:#ffffff;
    font-family:'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }

  /* 히어로 밴드 없음 — 버블 팩(circle-packing) 차트가 캔버스 전체를 채우는 풀블리드.
     제목·필터패널·범례는 차트 위에 얇게 떠 있는 오버레이일 뿐, 별도 영역을 점유하지 않음. */
  .canvas{
    position:relative;
    width:1280px;
    height:920px;
    background:#ffffff;
    overflow:hidden;
  }

  /* ---------- 좌측 세로 시간축 (사이드바 아님 — 스크롤형 타임라인 내비 느낌) ---------- */
  .timeline{
    position:absolute;
    left:0; top:0; bottom:0;
    width:64px;
    padding:44px 14px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    z-index:2;
  }
  .timeline .yr-tick{ display:flex; align-items:center; }
  .timeline .yr-bar{
    width:30px;
    height:7px;
    border-radius:3px;
    background:var(--muted);
    opacity:.55;
  }

  /* 시간대 점선 구분선 — 버블 뒤로 캔버스 전체 폭을 가로지름 */
  .timeline-lines{
    position:absolute;
    left:64px; right:0; top:0; bottom:0;
    padding:44px 0;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    z-index:0;
    pointer-events:none;
  }
  .timeline-lines .div-line{ border-top:1.5px dotted var(--grid); }

  /* ---------- 제목 오버레이 (히어로 밴드 없이 차트 위에 얇게 배치) ---------- */
  .head-overlay{
    position:absolute;
    left:88px; top:32px;
    max-width:520px;
    z-index:3;
  }
  .eyebrow{ font-size:14px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--eyebrow); margin-bottom:6px; }
  .eyebrow:empty{ display:none; margin:0; }
  .title{ font-size:26px; font-weight:800; line-height:1.32; color:var(--ink); margin-bottom:6px; }
  .title:empty{ display:none; margin:0; }
  .subtitle{ font-size:15px; line-height:1.6; color:var(--muted); }
  .subtitle:empty{ display:none; margin:0; }

  /* ---------- 필터 패널 (우측 상단, 반투명 옅은 하늘색 카드, 대시보드 UI 위젯) ---------- */
  .filter-panel{
    position:absolute;
    right:32px; top:32px;
    width:216px;
    background:linear-gradient(180deg,var(--hero0),var(--hero1));
    border-radius:10px;
    padding:18px 20px;
    opacity:.94;
    z-index:4;
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .filter-panel .fp-title{ width:86px; height:8px; border-radius:4px; background:var(--muted); opacity:.6; }
  .filter-panel .fp-col{ display:flex; flex-direction:column; gap:9px; }
  .filter-panel .fp-col-head{ width:118px; height:7px; border-radius:3px; background:var(--muted); opacity:.75; }
  .filter-panel .fp-row{ display:flex; align-items:center; gap:8px; }
  .filter-panel .fp-radio{ width:10px; height:10px; border-radius:50%; border:1.5px solid var(--muted); flex-shrink:0; background:transparent; }
  .filter-panel .fp-row-bar{ flex:1; height:6px; border-radius:3px; background:var(--soft); }

  /* ---------- 버블 팩 차트 슬롯 (전체 캔버스를 공유하는 3개 레이어) ---------- */
  .bubble-field{
    position:absolute;
    left:64px; right:0; top:0; bottom:0;
    z-index:1;
  }
  section.chart-slot{
    position:absolute;
    inset:0;
  }
  section.chart-slot:has([data-jarvis-empty]){ display:none; }

  /* ---------- 버블 컴포넌트 (재사용 — 채움 단계에서 삽입) ----------
     주입 마크업 예시 (chart-slot 내부, inline 좌표/크기/폰트는 실데이터 비례):
       <div class="bubble bubble--a2" style="width:260px;height:260px;left:40px;top:120px;font-size:26px;">
         <span class="bubble-label">
           <b class="bubble-name">Anthem</b>
           <span class="bubble-value">80,000,000</span>
         </span>
       </div>
       <div class="bubble bubble--a1 bubble--soft" style="width:64px;height:64px;left:340px;top:60px;font-size:11px;"></div>
  --------------------------------------------------------------------- */
  .bubble{
    position:absolute;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    overflow:hidden;
  }
  .bubble--a1{ background:var(--a1); }
  .bubble--a1.bubble--soft{ background:var(--a1s); }
  .bubble--a2{ background:var(--a2); }
  .bubble--a2.bubble--soft{ background:var(--a2s); }
  .bubble-label{ padding:6px; line-height:1.3; color:#fff; font-weight:700; }
  .bubble--a1.bubble--soft .bubble-label,
  .bubble--a2.bubble--soft .bubble-label{ color:var(--ink); }
  .bubble-name{ display:block; font-size:1em; }
  .bubble-value{ display:block; font-size:.64em; font-weight:500; opacity:.9; margin-top:.15em; }

  /* ---------- 히어로 수치 (밴드 없이 좌하단에 떠 있는 최소 수치 칩) ---------- */
  .hero-stats{
    position:absolute;
    left:88px; bottom:26px;
    display:flex;
    gap:28px;
    z-index:3;
  }
  .hero-stats:empty{ display:none; }
  .hero-stats .stat{ display:flex; flex-direction:column; gap:2px; }
  .hero-stats .stat .num{ font-size:22px; font-weight:800; color:var(--ink); line-height:1.1; }
  .hero-stats .stat .lbl{ font-size:13px; color:var(--muted); }

  /* ---------- 범례 (우하단, 두 카테고리 색 구분) ---------- */
  .mini-cards{
    position:absolute;
    right:32px; bottom:26px;
    display:flex;
    flex-direction:column;
    gap:8px;
    z-index:3;
  }
  .mini-cards:empty{ display:none; }
  .mini-cards .legend-item{ display:flex; align-items:center; gap:8px; font-size:13px; color:var(--muted); }
  .mini-cards .legend-item .dot{ width:10px; height:10px; border-radius:50%; flex-shrink:0; }

  /* ---------- 하단 출처/브랜드 (최소 코너 표기) ---------- */
  .footer{
    position:absolute;
    left:88px; right:32px; bottom:6px;
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    z-index:3;
  }
  .footer .source{ font-size:13px; color:var(--muted); }
  .footer .source:empty{ display:none; }
  .footer .brand{ font-size:13px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--eyebrow); }
  .footer .brand:empty{ display:none; }
</style>
</head>
<body>

<div class="canvas">

  <div class="timeline-lines">
    <div class="div-line"></div>
    <div class="div-line"></div>
    <div class="div-line"></div>
    <div class="div-line"></div>
    <div class="div-line"></div>
    <div class="div-line"></div>
  </div>

  <div class="timeline">
    <div class="yr-tick"><span class="yr-bar"></span></div>
    <div class="yr-tick"><span class="yr-bar"></span></div>
    <div class="yr-tick"><span class="yr-bar"></span></div>
    <div class="yr-tick"><span class="yr-bar"></span></div>
    <div class="yr-tick"><span class="yr-bar"></span></div>
    <div class="yr-tick"><span class="yr-bar"></span></div>
  </div>

  <div class="bubble-field">
    <section class="chart-slot">{CHART_1}</section>
    <section class="chart-slot">{CHART_2}</section>
    <section class="chart-slot">{CHART_3}</section>
  </div>

  <div class="head-overlay">
    <p class="eyebrow">{EYEBROW}</p>
    <h1 class="title">{TITLE}</h1>
    <p class="subtitle">{SUBTITLE}</p>
  </div>

  <div class="filter-panel">
    <div class="fp-title"></div>
    <div class="fp-col">
      <div class="fp-col-head"></div>
      <div class="fp-row"><span class="fp-radio"></span><span class="fp-row-bar"></span></div>
      <div class="fp-row"><span class="fp-radio"></span><span class="fp-row-bar"></span></div>
      <div class="fp-row"><span class="fp-radio"></span><span class="fp-row-bar"></span></div>
    </div>
    <div class="fp-col">
      <div class="fp-col-head"></div>
      <div class="fp-row"><span class="fp-radio"></span><span class="fp-row-bar"></span></div>
      <div class="fp-row"><span class="fp-radio"></span><span class="fp-row-bar"></span></div>
    </div>
  </div>

  <div class="hero-stats">{HERO_STATS}</div>

  <div class="mini-cards">{MINI_CARDS}</div>

  <div class="footer">
    <span class="source">{SOURCE}</span>
    <span class="brand">{BRAND}</span>
  </div>

</div>

</body>
</html>
