<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, initial-scale=1">
<title>{TITLE}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap');

  :root{
    --hero0:#153c2a;
    --hero1:#2f7a54;
    --ink:#14181d;
    --a1:#1f5c3f;
    --a1s:#bfdbcd;
    --a2:#9aabc0;
    --a2s:#e7ebf1;
    --soft:#ffffff;
    --muted:#98a1ac;
    --eyebrow:#6b7684;
    --grid:#dde2e8;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html,body{
    width:1280px;
    background:var(--soft);
    font-family:'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  .canvas{ width:1280px; margin:0 auto; background:var(--soft); padding:88px 96px 64px; }

  .hero-stats:empty,
  .mini-cards:empty{ display:none; }

  /* ── 차트 슬롯 공통 — 빈 슬롯 자동 은폐 (필수 규칙) ── */
  section:has([data-jarvis-empty]){ display:none; }

  /* ============================================================
     0. 상단 헤더 — 히어로 밴드·컬러 배경 없음. 텍스트만 존재하며
        전부 비어있으면 헤더 자체가 완전히 사라져 차트가 캔버스
        전체를 즉시 차지하는 구조 (레이아웃 원칙 그대로 반영)
     ============================================================ */
  .head{ margin-bottom:48px; }
  .head:not(:has(.eyebrow:not(:empty)))
        :not(:has(.title:not(:empty)))
        :not(:has(.subtitle:not(:empty)))
        :not(:has(.hero-stats:not(:empty))){ display:none; margin:0; }

  .eyebrow{
    font-size:14px;
    font-weight:700;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--eyebrow);
    margin:0 0 14px;
  }
  .eyebrow:empty{ display:none; margin:0; }

  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.3;
    letter-spacing:-.005em;
    color:var(--ink);
    max-width:1000px;
    margin:0 0 10px;
  }
  .title:empty{ display:none; margin:0; }

  .subtitle{
    font-size:16px;
    font-weight:400;
    line-height:1.6;
    color:var(--muted);
    max-width:920px;
    margin:0;
  }
  .subtitle:empty{ display:none; }

  /* 선택적 수치 스트립 — 미사용 시 자동 숨김 */
  .hero-stats{
    display:flex;
    flex-wrap:wrap;
    gap:40px;
    margin-top:24px;
  }
  .hero-stats:empty{ display:none; margin:0; }
  .hero-stats .stat{ display:flex; flex-direction:column; gap:4px; }
  .hero-stats .stat .num{ font-size:24px; font-weight:800; color:var(--a1); line-height:1; }
  .hero-stats .stat .lbl{ font-size:14px; color:var(--muted); }

  /* ============================================================
     1. 단일 수평 랭킹 막대그래프 (CHART_1) — 카드·패널·그림자·
        테두리 없음. 화이트 배경 위에 직접 노출. 유일한 구조 요소는
        막대 플롯 열의 좌측 얇은 회색 축선(border-left) 하나뿐 —
        그리드선·눈금 없음. 배경 텍스처 없음(grid/dots/glow/diagonal
        전부 none). 막대 모서리는 각진 형태(border-radius 없음).

        최상위(1위) 행만 진한 다크그린 그라디언트 + 굵은 검정 텍스트로
        강조하고, 나머지 행은 옅은 블루그레이 막대 + 옅은 회색 텍스트로
        낮은 위계를 표현한다.

     주입 마크업 예시 (라벨 개수만큼 반복 — 라벨/플롯 두 열이
     동일 gap·row 순서로 1:1 대응해야 함, 1위 행만 --hero 수식자):
       <div class="chart-grid">
         <div class="bar-labels">
           <span class="bar-label bar-label--hero">World</span>
           <span class="bar-label">Asia</span>
           <span class="bar-label">Africa</span>
           <span class="bar-label">Europe</span>
           <span class="bar-label">North America</span>
           <span class="bar-label">South America</span>
           <span class="bar-label">Oceania</span>
         </div>
         <div class="bar-plots">
           <div class="bar-plot">
             <div class="bar-fill bar-fill--hero" style="width:100%"></div>
             <span class="bar-value bar-value--hero">100</span>
           </div>
           <div class="bar-plot">
             <div class="bar-fill" style="width:58%"></div>
             <span class="bar-value">58</span>
           </div>
           <!-- 나머지 행 동일 패턴 반복 -->
         </div>
       </div>
     ------------------------------------------------------------- */
  .chart-slot--main{ display:block; }

  .chart-grid{
    display:grid;
    grid-template-columns:230px 1fr;
    column-gap:24px;
  }

  .bar-labels{ display:flex; flex-direction:column; gap:30px; }
  .bar-label{
    height:44px;
    display:flex;
    align-items:center;
    justify-content:flex-end;
    text-align:right;
    font-size:16px;
    font-weight:500;
    color:var(--muted);
  }
  .bar-label--hero{
    color:var(--ink);
    font-weight:800;
    font-size:18px;
  }

  .bar-plots{
    display:flex;
    flex-direction:column;
    gap:30px;
    border-left:1px solid var(--grid);
  }
  .bar-plot{
    height:44px;
    display:flex;
    align-items:center;
    padding-left:22px;
  }
  .bar-fill{
    height:36px;
    background:var(--a2);
    border-radius:0;
  }
  .bar-fill--hero{
    background:linear-gradient(90deg, var(--hero0), var(--hero1));
  }
  .bar-value{
    margin-left:14px;
    font-size:15px;
    font-weight:600;
    color:var(--muted);
    white-space:nowrap;
  }
  .bar-value--hero{
    color:var(--ink);
    font-weight:800;
    font-size:16px;
  }

  /* ============================================================
     2~3. 보조 랭킹 막대(CHART_2 / CHART_3) — 기본 미사용(숨김).
        같은 chart-grid 클래스 재사용 가능. 미주입 시 자동 은폐.
     ============================================================ */
  .chart-slot--aux{
    margin-top:36px;
    min-height:140px;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  /* ============================================================
     4. 하단 범례/메모 리스트 (MINI_CARDS) — 카드 없는 텍스트 행.
        미사용 시 자동 은폐.

     주입 마크업 예시(반복):
       <div class="row">
         <span class="dot dot--a1"></span>
         <span class="txt">라벨 설명</span>
       </div>
     ------------------------------------------------------------- */
  .mini-cards{
    display:flex;
    flex-direction:column;
    gap:12px;
    margin-top:36px;
  }
  .mini-cards:empty{ display:none; margin:0; }
  .mini-cards .row{ display:flex; align-items:center; gap:10px; }
  .mini-cards .row .dot{ width:9px; height:9px; border-radius:2px; flex-shrink:0; }
  .mini-cards .row .dot--a1{ background:var(--a1); }
  .mini-cards .row .dot--a1s{ background:var(--a1s); }
  .mini-cards .row .dot--a2{ background:var(--a2); }
  .mini-cards .row .dot--a2s{ background:var(--a2s); }
  .mini-cards .row .txt{ font-size:14px; color:var(--muted); }

  .foot{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    gap:24px;
    margin-top:40px;
    padding-top:18px;
    border-top:1px solid var(--grid);
  }
  .foot:not(:has(.source:not(:empty))):not(:has(.brand:not(:empty))){ display:none; }
  .source{ font-size:13px; color:var(--muted); }
  .source:empty{ display:none; }
  .brand{ font-size:13px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--eyebrow); }
  .brand:empty{ display:none; }
</style>
</head>
<body>

  <div class="canvas">

    <header class="head">
      <p class="eyebrow">{EYEBROW}</p>
      <h1 class="title">{TITLE}</h1>
      <p class="subtitle">{SUBTITLE}</p>
      <div class="hero-stats">{HERO_STATS}</div>
    </header>

    <section class="chart-slot chart-slot--main">{CHART_1}</section>

    <section class="chart-slot chart-slot--aux">{CHART_2}</section>
    <section class="chart-slot chart-slot--aux">{CHART_3}</section>

    <div class="mini-cards">{MINI_CARDS}</div>

    <footer class="foot">
      <span class="source">{SOURCE}</span>
      <span class="brand">{BRAND}</span>
    </footer>

  </div>

</body>
</html>
