<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>{TITLE}</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

:root{
  --hero0:#FFFFFF;
  --hero1:#F5F6F8;
  --ink:#20232B;
  --a1:#12A594;
  --a1s:#E0357F;
  --a2:#F2994A;
  --a2s:#3D7BF5;
  --soft:#F1F2F6;
  --muted:#8A8F9C;
  --eyebrow:#F2994A;
  --grid:#E5E7EC;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  width:1280px;
  background:var(--hero0);
  color:var(--ink);
  font-family:'Noto Sans KR',sans-serif;
}

.hero-stats:empty,
.mini-cards:empty{display:none;}

section:has([data-jarvis-empty]){display:none;}

/* ---------- canvas ---------- */
.canvas{
  position:relative;
  width:1280px;
  background:var(--hero0);
  overflow:hidden;
}
.canvas::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:repeating-linear-gradient(135deg,var(--grid) 0,var(--grid) 1px,transparent 1px,transparent 46px);
  opacity:.55;
  z-index:0;
}
.canvas::after{
  content:"";
  position:absolute;
  inset:0;
  background-image:
    linear-gradient(var(--grid) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:64px 64px;
  opacity:.4;
  z-index:0;
}
.canvas-inner{
  position:relative;
  z-index:1;
  padding:56px 72px 40px;
}

/* ---------- masthead / logo ---------- */
.masthead{
  display:flex;
  align-items:flex-start;
  gap:32px;
  margin-bottom:30px;
}
.logo-box{
  flex:0 0 100px;
  width:100px;
  background:var(--soft);
  border:1px solid var(--grid);
  border-radius:4px;
  padding:12px 10px 10px;
}
.logo-text{
  font-size:14px;
  font-weight:900;
  letter-spacing:.5px;
  line-height:1.28;
  text-transform:uppercase;
  color:var(--ink);
  margin-bottom:10px;
}
.logo-bar{display:flex;gap:3px;height:5px;}
.logo-bar span{flex:1;border-radius:2px;}

.title-block{flex:1;min-width:0;}
.eyebrow{
  font-size:13px;
  font-weight:700;
  letter-spacing:3px;
  text-transform:uppercase;
  color:var(--eyebrow);
  margin-bottom:14px;
}
.title-block h1{
  font-size:36px;
  font-weight:900;
  line-height:1.3;
  color:var(--ink);
  margin-bottom:12px;
}
.title-block .subtitle{
  font-size:16px;
  line-height:1.7;
  color:var(--muted);
  max-width:760px;
}
.brand{
  flex:0 0 auto;
  font-size:14px;
  font-weight:700;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--muted);
  padding-top:4px;
}

/* ---------- hero stats ---------- */
.hero-stats{
  display:flex;
  gap:44px;
  flex-wrap:wrap;
  padding:6px 0 30px;
}
.hero-stats .stat{flex:0 0 auto;}

/* ---------- mega grid (asymmetric free grid) ---------- */
.mega-grid{
  display:grid;
  grid-template-columns:repeat(12,1fr);
  grid-template-rows:228px 200px 202px;
  gap:22px 18px;
}

.shape-card{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  min-width:0;
  min-height:0;
  background:transparent;
}

.chart-slot{background:transparent;border:none;box-shadow:none;}

/* leader-line number tag */
.leader-tag{
  position:absolute;
  display:flex;
  align-items:center;
  gap:6px;
  font-size:12px;
  font-weight:700;
  color:var(--ink);
}
.leader-tag::before{content:"";width:24px;height:1px;background:var(--muted);}
.leader-tag .num{
  width:20px;height:20px;border-radius:50%;
  background:var(--hero0);
  border:1px solid var(--grid);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;
}
.leader-tag.rev{flex-direction:row-reverse;}
.leader-tag.rev::before{order:2;}

/* grid placement */
.g-pie{grid-column:1/4;grid-row:1;}
.g-donut{grid-column:4/6;grid-row:1;}
.g-ringdonut{grid-column:6/10;grid-row:1;}
.g-people{grid-column:10/13;grid-row:1;}

.g-bar{grid-column:1/5;grid-row:2;}
.g-bulb{grid-column:5/8;grid-row:2;}
.g-gear{grid-column:8/11;grid-row:2;}
.g-diamond{grid-column:11/13;grid-row:2;}

.g-triangle{grid-column:1/3;grid-row:3;}
.g-timeline{grid-column:3/6;grid-row:3;}
.g-map{grid-column:6/9;grid-row:3;}
.g-pins{grid-column:9/11;grid-row:3;}
.g-devices{grid-column:11/13;grid-row:3;}

/* ---------- decorative: small donut ---------- */
.donut-mini{
  width:104px;height:104px;border-radius:50%;
  background:conic-gradient(var(--a2s) 0 62%,var(--soft) 62% 100%);
}
.donut-mini-hole{position:absolute;width:64px;height:64px;border-radius:50%;background:var(--hero0);}
.g-donut .leader-tag{top:6px;right:2px;}

/* ---------- decorative: people icon infographic ---------- */
.people-icons{width:88%;height:auto;}

/* ---------- decorative: lightbulb progress ---------- */
.bulb-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;}
.bulb-icon{width:78px;height:auto;}
.progress-track{width:96px;height:6px;border-radius:4px;background:var(--soft);overflow:hidden;}
.progress-fill{height:100%;border-radius:4px;background:var(--a2);}
.g-bulb .leader-tag{bottom:4px;right:6px;}

/* ---------- decorative: gear 3-step ---------- */
.gear-steps{width:92%;height:auto;}

/* ---------- decorative: diamond 4-split ---------- */
.diamond-split{width:104px;height:104px;}
.g-diamond .leader-tag{top:2px;left:2px;}

/* ---------- decorative: triangle comparison ---------- */
.tri-compare{width:78%;height:auto;}
.g-triangle .leader-tag{bottom:8px;right:4px;}

/* ---------- decorative: timeline bar ---------- */
.timeline-bar{width:92%;height:auto;}

/* ---------- decorative: world map + pins ---------- */
.world-map{width:92%;height:auto;}
.g-map .leader-tag{bottom:6px;left:6px;}

/* ---------- mini-cards: pin option list ---------- */
.mini-cards.g-pins{
  list-style:none;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:10px;
  height:100%;
}
.mini-cards.g-pins .pin-card{
  display:flex;
  align-items:center;
  gap:9px;
  font-size:14px;
  font-weight:500;
  color:var(--ink);
}
.mini-cards.g-pins .pin-dot{
  width:11px;height:11px;flex-shrink:0;
  border-radius:50% 50% 50% 0;
  transform:rotate(45deg);
  background:var(--a1);
}
.mini-cards.g-pins .pin-card:nth-child(2) .pin-dot{background:var(--a2);}
.mini-cards.g-pins .pin-card:nth-child(3) .pin-dot{background:var(--a2s);}
.mini-cards.g-pins .pin-card:nth-child(4) .pin-dot{background:var(--a1s);}
.mini-cards.g-pins .pin-label{line-height:1.4;}
.mini-cards .mini-card{min-width:0;}
.mini-cards .caption{font-size:14px;line-height:1.6;color:var(--muted);}

/* ---------- decorative: device mockups ---------- */
.device-stack{position:relative;width:100%;height:100%;}
.device-laptop{position:absolute;left:2px;bottom:14px;width:132px;}
.device-laptop .screen{
  width:132px;height:82px;
  background:var(--ink);
  border-radius:6px 6px 0 0;
  padding:6px;
}
.device-laptop .screen-fill{width:100%;height:100%;background:var(--soft);border-radius:2px;}
.device-laptop .base{width:150px;height:7px;margin-left:-9px;background:var(--muted);border-radius:0 0 4px 4px;}
.device-tablet{
  position:absolute;right:52px;bottom:0;
  width:60px;height:86px;
  background:var(--a2s);
  border:4px solid var(--ink);
  border-radius:9px;
}
.device-phone{
  position:absolute;right:0;bottom:-4px;
  width:34px;height:68px;
  background:var(--a2);
  border:3px solid var(--ink);
  border-radius:7px;
}
.g-devices .leader-tag{top:2px;left:2px;}

/* ---------- icon bar ---------- */
.icon-bar{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:22px;
  padding:30px 0 8px;
}
.icon-circle{
  width:44px;height:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
}
.icon-circle svg{width:22px;height:22px;}

/* ---------- footer ---------- */
.footer{
  margin-top:18px;
  padding-top:20px;
  border-top:1px solid var(--grid);
  display:flex;
  align-items:center;
  justify-content:center;
}
.footer .source{font-size:13px;color:var(--muted);}
</style>
</head>
<body>

<div class="canvas">
<div class="canvas-inner">

  <div class="masthead">
    <div class="logo-box">
      <div class="logo-text">CREATIVE<br>BUSINESS</div>
      <div class="logo-bar">
        <span style="background:var(--a1)"></span>
        <span style="background:var(--a1s)"></span>
        <span style="background:var(--a2)"></span>
        <span style="background:var(--a2s)"></span>
      </div>
    </div>
    <div class="title-block">
      <p class="eyebrow">{EYEBROW}</p>
      <h1>{TITLE}</h1>
      <p class="subtitle">{SUBTITLE}</p>
    </div>
    <div class="brand">{BRAND}</div>
  </div>

  <div class="hero-stats">{HERO_STATS}</div>

  <div class="mega-grid">

    <!-- top row -->
    <section class="shape-card chart-slot g-pie">{CHART_1}</section>

    <div class="shape-card g-donut">
      <div class="donut-mini"><div class="donut-mini-hole"></div></div>
      <span class="leader-tag"><span class="num">02</span></span>
    </div>

    <section class="shape-card chart-slot g-ringdonut">{CHART_3}</section>

    <div class="shape-card g-people">
      <svg class="people-icons" viewBox="0 0 220 140" xmlns="http://www.w3.org/2000/svg">
        <line x1="8" y1="122" x2="212" y2="122" stroke="var(--grid)" stroke-width="1.5"/>
        <g fill="var(--a1)"><circle cx="40" cy="55" r="14"/><rect x="26" y="70" width="28" height="46" rx="12"/></g>
        <g fill="var(--a2)"><circle cx="92" cy="40" r="14"/><rect x="78" y="55" width="28" height="61" rx="12"/></g>
        <g fill="var(--a2s)"><circle cx="144" cy="48" r="14"/><rect x="130" y="63" width="28" height="53" rx="12"/></g>
        <g fill="var(--a1s)"><circle cx="192" cy="60" r="14"/><rect x="178" y="75" width="28" height="41" rx="12"/></g>
      </svg>
    </div>

    <!-- middle row -->
    <section class="shape-card chart-slot g-bar">{CHART_2}</section>

    <div class="shape-card g-bulb">
      <div class="bulb-wrap">
        <svg class="bulb-icon" viewBox="0 0 120 160" xmlns="http://www.w3.org/2000/svg">
          <path d="M60 18a42 42 0 0 1 26 76l-6 10H40l-6-10A42 42 0 0 1 60 18Z" fill="var(--soft)" stroke="var(--a2)" stroke-width="3"/>
          <rect x="46" y="104" width="28" height="10" rx="3" fill="var(--muted)"/>
          <rect x="50" y="116" width="20" height="8" rx="3" fill="var(--muted)"/>
          <path d="M44 58 L56 70 L78 42" fill="none" stroke="var(--a1)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div class="progress-track"><div class="progress-fill" style="width:68%;"></div></div>
      </div>
      <span class="leader-tag rev"><span class="num">03</span></span>
    </div>

    <div class="shape-card g-gear">
      <svg class="gear-steps" viewBox="0 0 260 120" xmlns="http://www.w3.org/2000/svg">
        <line x1="40" y1="60" x2="220" y2="60" stroke="var(--grid)" stroke-width="2" stroke-dasharray="4 5"/>
        <g transform="translate(40,60)">
          <g fill="var(--a1)">
            <rect x="-4" y="-34" width="8" height="10" rx="2"/><rect x="-4" y="24" width="8" height="10" rx="2"/>
            <rect x="-34" y="-4" width="10" height="8" rx="2"/><rect x="24" y="-4" width="10" height="8" rx="2"/>
            <rect x="-4" y="-34" width="8" height="10" rx="2" transform="rotate(45)"/><rect x="-4" y="24" width="8" height="10" rx="2" transform="rotate(45)"/>
            <rect x="-34" y="-4" width="10" height="8" rx="2" transform="rotate(45)"/><rect x="24" y="-4" width="10" height="8" rx="2" transform="rotate(45)"/>
          </g>
          <circle r="22" fill="var(--a1)"/>
          <text x="0" y="6" text-anchor="middle" font-size="15" font-weight="700" fill="var(--hero0)">01</text>
        </g>
        <g transform="translate(130,60)">
          <g fill="var(--a2)">
            <rect x="-4" y="-34" width="8" height="10" rx="2"/><rect x="-4" y="24" width="8" height="10" rx="2"/>
            <rect x="-34" y="-4" width="10" height="8" rx="2"/><rect x="24" y="-4" width="10" height="8" rx="2"/>
            <rect x="-4" y="-34" width="8" height="10" rx="2" transform="rotate(45)"/><rect x="-4" y="24" width="8" height="10" rx="2" transform="rotate(45)"/>
            <rect x="-34" y="-4" width="10" height="8" rx="2" transform="rotate(45)"/><rect x="24" y="-4" width="10" height="8" rx="2" transform="rotate(45)"/>
          </g>
          <circle r="22" fill="var(--a2)"/>
          <text x="0" y="6" text-anchor="middle" font-size="15" font-weight="700" fill="var(--hero0)">02</text>
        </g>
        <g transform="translate(220,60)">
          <g fill="var(--a2s)">
            <rect x="-4" y="-34" width="8" height="10" rx="2"/><rect x="-4" y="24" width="8" height="10" rx="2"/>
            <rect x="-34" y="-4" width="10" height="8" rx="2"/><rect x="24" y="-4" width="10" height="8" rx="2"/>
            <rect x="-4" y="-34" width="8" height="10" rx="2" transform="rotate(45)"/><rect x="-4" y="24" width="8" height="10" rx="2" transform="rotate(45)"/>
            <rect x="-34" y="-4" width="10" height="8" rx="2" transform="rotate(45)"/><rect x="24" y="-4" width="10" height="8" rx="2" transform="rotate(45)"/>
          </g>
          <circle r="22" fill="var(--a2s)"/>
          <text x="0" y="6" text-anchor="middle" font-size="15" font-weight="700" fill="var(--hero0)">03</text>
        </g>
      </svg>
    </div>

    <div class="shape-card g-diamond">
      <svg class="diamond-split" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <polygon points="60,10 110,60 60,60" fill="var(--a1)"/>
        <polygon points="110,60 60,110 60,60" fill="var(--a2)"/>
        <polygon points="60,110 10,60 60,60" fill="var(--a2s)"/>
        <polygon points="10,60 60,10 60,60" fill="var(--a1s)"/>
        <circle cx="60" cy="60" r="4" fill="var(--hero0)"/>
      </svg>
      <span class="leader-tag"><span class="num">04</span></span>
    </div>

    <!-- bottom row -->
    <div class="shape-card g-triangle">
      <svg class="tri-compare" viewBox="0 0 160 130" xmlns="http://www.w3.org/2000/svg">
        <polygon points="80,6 20,50 140,50" fill="var(--a2s)"/>
        <polygon points="20,54 140,54 108,92 52,92" fill="var(--a2)"/>
        <polygon points="52,96 108,96 88,124 72,124" fill="var(--a1)"/>
      </svg>
      <span class="leader-tag"><span class="num">A</span></span>
    </div>

    <div class="shape-card g-timeline">
      <svg class="timeline-bar" viewBox="0 0 260 60" xmlns="http://www.w3.org/2000/svg">
        <line x1="14" y1="30" x2="246" y2="30" stroke="var(--muted)" stroke-width="2"/>
        <circle cx="30" cy="30" r="8" fill="var(--a1)"/>
        <circle cx="100" cy="30" r="8" fill="var(--a2)"/>
        <circle cx="170" cy="30" r="8" fill="var(--a2s)"/>
        <circle cx="230" cy="30" r="8" fill="var(--a1s)"/>
      </svg>
    </div>

    <div class="shape-card g-map">
      <svg class="world-map" viewBox="0 0 260 140" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="60" cy="55" rx="38" ry="22" fill="var(--soft)"/>
        <ellipse cx="140" cy="40" rx="30" ry="18" fill="var(--soft)"/>
        <ellipse cx="200" cy="82" rx="34" ry="24" fill="var(--soft)"/>
        <ellipse cx="94" cy="102" rx="26" ry="16" fill="var(--soft)"/>
        <path d="M60 26c6-7 15-7 18 0 4 7-2 16-9 23-7-7-13-16-9-23z" fill="var(--a2)"/>
        <path d="M150 56c6-7 15-7 18 0 4 7-2 16-9 23-7-7-13-16-9-23z" fill="var(--a2s)"/>
        <path d="M206 50c6-7 15-7 18 0 4 7-2 16-9 23-7-7-13-16-9-23z" fill="var(--a1)"/>
      </svg>
      <span class="leader-tag"><span class="num">B</span></span>
    </div>

    <ul class="mini-cards g-pins">{MINI_CARDS}</ul>

    <div class="shape-card g-devices">
      <div class="device-stack">
        <div class="device-laptop">
          <div class="screen"><div class="screen-fill"></div></div>
          <div class="base"></div>
        </div>
        <div class="device-tablet"></div>
        <div class="device-phone"></div>
      </div>
      <span class="leader-tag"><span class="num">C</span></span>
    </div>

  </div>

  <div class="icon-bar">
    <span class="icon-circle" style="background:var(--a1)">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="6" width="18" height="12" rx="1" fill="none" stroke="var(--hero0)" stroke-width="1.8"/><path d="M3 7l9 6 9-6" fill="none" stroke="var(--hero0)" stroke-width="1.8"/></svg>
    </span>
    <span class="icon-circle" style="background:var(--a2)">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><circle cx="10" cy="10" r="6" fill="none" stroke="var(--hero0)" stroke-width="1.8"/><line x1="15" y1="15" x2="21" y2="21" stroke="var(--hero0)" stroke-width="1.8"/></svg>
    </span>
    <span class="icon-circle" style="background:var(--a2s)">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="3.2" fill="none" stroke="var(--hero0)" stroke-width="1.6"/><path d="M12 3v2.4M12 18.6V21M21 12h-2.4M5.4 12H3M18.4 5.6l-1.7 1.7M7.3 16.7l-1.7 1.7M18.4 18.4l-1.7-1.7M7.3 7.3 5.6 5.6" fill="none" stroke="var(--hero0)" stroke-width="1.5"/></svg>
    </span>
    <span class="icon-circle" style="background:var(--a1s)">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="8" fill="none" stroke="var(--hero0)" stroke-width="1.8"/><path d="M12 7v5l4 2" fill="none" stroke="var(--hero0)" stroke-width="1.8" stroke-linecap="round"/></svg>
    </span>
  </div>

  <footer class="footer">
    <div class="source">{SOURCE}</div>
  </footer>

</div>
</div>

</body>
</html>
