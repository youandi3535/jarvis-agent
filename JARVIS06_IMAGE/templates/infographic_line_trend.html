<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, initial-scale=1">
<title>{TITLE}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap');

  :root{
    --hero0: #ffffff;
    --hero1: #ffffff;
    --ink: #1c2333;
    --a1: #2f6fd1;
    --a1s: #d9502c;
    --a2: #1f6b45;
    --a2s: #7a3b8c;
    --soft: #f7f7f7;
    --muted: #767671;
    --eyebrow: #6d7178;
    --grid: #d8d7d2;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    padding:0;
    width:1280px;
    background:var(--hero0);
    font-family:'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  /* 히어로 밴드·카드형 대시보드 없음 — 순백 캔버스를 단일 라인차트 하나가 가득 채우는
     미니멀 에디토리얼 스타일. 텍스처(그리드·도트·글로우·대각선) 전혀 없음.
     head/hero-stats, mini-cards/foot 는 전부 선택적 — 비어 있으면 완전히 접혀
     캔버스가 곧바로 라인차트로 시작/종료되도록(:empty 은폐) 설계됨. */
  .canvas{
    width:1280px;
    min-height:640px;
    margin:0 auto;
    padding:56px 64px 48px;
    background:var(--hero0);
    display:flex;
    flex-direction:column;
  }

  .head{ flex:0 0 auto; }

  .eyebrow{
    font-size:14px;
    font-weight:600;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--eyebrow);
    margin:0 0 8px;
  }
  .eyebrow:empty{ display:none; margin:0; }

  .title{
    font-size:32px;
    font-weight:800;
    line-height:1.26;
    letter-spacing:-.01em;
    color:var(--ink);
    margin:0 0 8px;
  }
  .title:empty{ display:none; margin:0; }

  .subtitle{
    font-size:16px;
    font-weight:400;
    line-height:1.55;
    color:var(--muted);
    max-width:1000px;
    margin:0 0 18px;
  }
  .subtitle:empty{ display:none; margin:0; }

  /* ── 선택적 히어로 수치 — 미사용 시 자동 숨김 ── */
  .hero-stats{
    display:flex;
    flex-wrap:wrap;
    gap:28px;
    margin:0 0 18px;
  }
  .hero-stats:empty{ display:none; margin:0; }
  .hero-stats .stat{ display:flex; flex-direction:column; gap:4px; }
  .hero-stats .stat .num{ font-size:28px; font-weight:800; color:var(--ink); line-height:1.1; }
  .hero-stats .stat .lbl{ font-size:14px; color:var(--muted); }

  /* ── 라인차트 그룹 컨테이너 — 최대 3개(CHART_1~3). 보통 CHART_1 하나만 채워
     캔버스 대부분을 차지하고 나머지 두 슬롯은 비어 자동으로 접힘(flex gap 특성) ── */
  .line-groups{
    flex:1 1 auto;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:40px;
  }

  /* ── 차트 슬롯 공통 — 빈 슬롯 자동 은폐 ── */
  section.chart-slot{ width:100%; }
  section.chart-slot:empty{ display:none; }
  section.chart-slot:has([data-jarvis-empty]){ display:none; }

  /* 단일 라인차트 — 카드·패널·테두리·그림자 일체 없음. 데이터 라인 자체가 유일한 시각 요소.
     하단 얇은 회색 축선 1개 + 시작/끝 연도 라벨만 존재(눈금·격자 생략).
     각 계열 끝점에 색상이 일치하는 원형 마커 + 굵은 숫자 라벨을 직접 배치해 최종 수치를 강조.

     주입 마크업 예시(4계열, 예: 1770→2023 완만→급상승 궤적):
       <div class="line-chart">
         <svg class="line-plot" viewBox="0 0 1040 400" preserveAspectRatio="none">
           <line class="axis-line" x1="0" y1="380" x2="1040" y2="380"/>
           <path class="line-path line-c1" d="M0,372 C300,368 560,300 720,150 C860,60 960,30 1040,20"/>
           <path class="line-path line-c2" d="M0,374 C300,371 560,340 720,230 C860,150 960,110 1040,130"/>
           <path class="line-path line-c3" d="M0,376 C300,374 560,358 720,290 C860,220 960,180 1040,150"/>
           <path class="line-path line-c4" d="M0,378 C300,376 560,368 720,330 C860,290 960,250 1040,260"/>
           <circle class="line-dot line-c1" cx="1040" cy="20" r="7"/>
           <circle class="line-dot line-c2" cx="1040" cy="130" r="7"/>
           <circle class="line-dot line-c3" cx="1040" cy="150" r="7"/>
           <text class="line-value line-c1" x="1054" y="26">28.5</text>
           <text class="line-value line-c2" x="1054" y="136">73.2</text>
           <text class="line-value line-c3" x="1054" y="156">63.8</text>
           <text class="axis-year axis-year--start" x="0" y="404">1770</text>
           <text class="axis-year axis-year--end" x="1040" y="404" text-anchor="end">2023</text>
         </svg>
       </div>

     색상 순서: line-c1(파랑)→line-c2(주황-빨강)→line-c3(짙은 초록)→line-c4(자주) 고정 반복
     (4계열 초과 시 순환). line-value 는 해당 계열과 동일 색상만 사용, 끝점 마커 없는
     보조 계열은 값 라벨 생략 가능. viewBox 우측은 라벨 폭만큼 여유를 두고 좌표 산정. */
  .chart-slot--line{ padding-right:110px; }

  .line-chart{ position:relative; width:100%; }

  .line-plot{
    display:block;
    width:100%;
    height:420px;
    overflow:visible;
  }

  /* 축선 — 캔버스 전체에서 유일한 구조선. 격자·눈금 없음 */
  .axis-line{ stroke:var(--grid); stroke-width:1.5; }

  .line-path{
    fill:none;
    stroke-width:4;
    stroke-linecap:round;
    stroke-linejoin:round;
  }
  .line-c1{ stroke:var(--a1); }
  .line-c2{ stroke:var(--a1s); }
  .line-c3{ stroke:var(--a2); }
  .line-c4{ stroke:var(--a2s); }

  .line-dot{ stroke:var(--hero0); stroke-width:3; }
  circle.line-dot.line-c1{ fill:var(--a1); }
  circle.line-dot.line-c2{ fill:var(--a1s); }
  circle.line-dot.line-c3{ fill:var(--a2); }
  circle.line-dot.line-c4{ fill:var(--a2s); }

  .line-value{
    font-family:'Noto Sans KR', sans-serif;
    font-size:26px;
    font-weight:800;
    dominant-baseline:middle;
  }
  .line-value.line-c1{ fill:var(--a1); }
  .line-value.line-c2{ fill:var(--a1s); }
  .line-value.line-c3{ fill:var(--a2); }
  .line-value.line-c4{ fill:var(--a2s); }

  .axis-year{
    font-family:'Noto Sans KR', sans-serif;
    font-size:14px;
    font-weight:500;
    fill:var(--muted);
  }

  /* ── 선택적 미니 카드 — 미사용 시 자동 숨김 ── */
  .mini-cards{
    display:flex;
    flex-wrap:wrap;
    gap:18px;
    margin:32px 0 0;
  }
  .mini-cards:empty{ display:none; margin:0; }
  .mini-cards .mini-card{
    flex:1 1 200px;
    padding:16px 18px;
    background:var(--soft);
    border:1px solid var(--grid);
  }
  .mini-cards .mini-card .num{ font-size:24px; font-weight:800; color:var(--ink); }
  .mini-cards .mini-card .lbl{ font-size:14px; color:var(--muted); margin-top:4px; }

  /* ── 푸터 — 출처/브랜드 둘 다 비면 구분선까지 완전히 접힘(구조선 1개 원칙 유지) ── */
  .foot{
    flex:0 0 auto;
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    gap:24px;
    margin:28px 0 0;
    padding-top:14px;
    border-top:1px solid var(--grid);
  }
  .foot:not(:has(.source:not(:empty))):not(:has(.brand:not(:empty))){ display:none; }
  .source{ font-size:14px; color:var(--muted); }
  .source:empty{ display:none; }
  .brand{ font-size:14px; font-weight:600; letter-spacing:.05em; text-transform:uppercase; color:var(--eyebrow); }
  .brand:empty{ display:none; }
</style>
</head>
<body>
  <div class="canvas">
    <header class="head">
      <p class="eyebrow">{EYEBROW}</p>
      <h1 class="title">{TITLE}</h1>
      <p class="subtitle">{SUBTITLE}</p>
    </header>

    <div class="hero-stats">{HERO_STATS}</div>

    <div class="line-groups">
      <section class="chart-slot chart-slot--line">{CHART_1}</section>
      <section class="chart-slot chart-slot--line">{CHART_2}</section>
      <section class="chart-slot chart-slot--line">{CHART_3}</section>
    </div>

    <div class="mini-cards">{MINI_CARDS}</div>

    <footer class="foot">
      <span class="source">{SOURCE}</span>
      <span class="brand">{BRAND}</span>
    </footer>
  </div>
</body>
</html>
