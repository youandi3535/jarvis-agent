<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, initial-scale=1">
<title>{TITLE}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap');

  :root{
    --hero0: #ffffff;
    --hero1: #f7f8fb;
    --ink: #1c2431;
    --a1: #ff7a3d;
    --a1s: #ffb37a;
    --a2: #2f7bff;
    --a2s: #82c6ff;
    --soft: #f1f3f7;
    --muted: #8994a5;
    --eyebrow: #ff7a3d;
    --grid: #e7eaf1;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    padding:0;
    width:1280px;
    background:var(--hero0);
    font-family:'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  /* 중앙 대형 3D 유리 토러스 히어로 + 좌우 대칭 HUD 라인 패널.
     카드 배경/테두리 없음 — 가는 라인·원형 배지·보케 글로우로만 깊이감 구성. */
  .stage{
    position:relative;
    width:1280px;
    overflow:hidden;
    background:linear-gradient(180deg, var(--hero0), var(--hero1));
    padding:60px 64px 48px;
  }

  /* ── 배경 보케 글로우 (그리드·도트 패턴 없음) ── */
  .bokeh{ position:absolute; border-radius:50%; filter:blur(46px); pointer-events:none; z-index:0; }
  .bokeh.b1{ width:420px; height:420px; left:-140px; top:-100px; background:radial-gradient(circle, color-mix(in srgb, var(--a1s), transparent 25%), transparent 70%); opacity:.55; }
  .bokeh.b2{ width:380px; height:380px; right:-120px; top:20px; background:radial-gradient(circle, color-mix(in srgb, var(--a2s), transparent 25%), transparent 70%); opacity:.5; }
  .bokeh.b3{ width:320px; height:320px; left:80px; bottom:-120px; background:radial-gradient(circle, color-mix(in srgb, var(--a2s), transparent 30%), transparent 70%); opacity:.45; }
  .bokeh.b4{ width:360px; height:360px; right:100px; bottom:-140px; background:radial-gradient(circle, color-mix(in srgb, var(--a1s), transparent 30%), transparent 70%); opacity:.5; }

  /* ── 상단 헤더 ── */
  .head{ position:relative; z-index:2; text-align:center; max-width:860px; margin:0 auto; }
  .eyebrow{
    font-size:14px; font-weight:700; letter-spacing:.14em; text-transform:uppercase;
    color:var(--eyebrow); margin:0 0 10px;
  }
  .eyebrow:empty{ display:none; margin:0; }
  .title{
    font-size:32px; font-weight:800; line-height:1.28; letter-spacing:-.01em;
    color:var(--ink); margin:0 0 10px;
  }
  .title:empty{ display:none; margin:0; }
  .subtitle{ font-size:16px; line-height:1.6; color:var(--muted); margin:0; }
  .subtitle:empty{ display:none; margin:0; }

  /* ── 3열 그리드 — 좌 HUD 패널 | 중앙 히어로 | 우 HUD 패널 ── */
  .canvas{
    position:relative; z-index:2;
    display:grid;
    grid-template-columns:250px 1fr 250px;
    column-gap:24px;
    align-items:center;
    min-height:660px;
    margin-top:44px;
  }

  .col{ display:flex; flex-direction:column; gap:44px; }
  .col-left{ align-items:stretch; }
  .col-right{ align-items:stretch; }

  /* ── HUD 타이 — 원형 커넥터 배지 + 가는 라인으로 히어로와 연결 ── */
  .hud{ position:relative; }
  .col-left .hud{ padding-right:28px; text-align:right; }
  .col-right .hud{ padding-left:28px; text-align:left; }
  .hud:has(> .mini-group:empty){ display:none; }
  .hud:has(> section.chart-slot [data-jarvis-empty]){ display:none; }

  .node{
    position:absolute; top:4px;
    width:16px; height:16px; border-radius:50%;
    background:var(--hero0);
    border:2px solid var(--line-c, var(--a1));
    box-shadow:0 2px 8px color-mix(in srgb, var(--line-c, var(--a1)), transparent 70%);
    z-index:2;
  }
  .node.n-a1{ --line-c:var(--a1); }
  .node.n-a2{ --line-c:var(--a2); }
  .col-left .node{ right:0; }
  .col-right .node{ left:0; }
  .col-left .node::after{
    content:""; position:absolute; top:50%; left:100%; width:28px; height:1px;
    transform:translateY(-50%);
    background:linear-gradient(90deg, var(--line-c, var(--a1)), transparent);
  }
  .col-right .node::after{
    content:""; position:absolute; top:50%; right:100%; width:28px; height:1px;
    transform:translateY(-50%);
    background:linear-gradient(270deg, var(--line-c, var(--a1)), transparent);
  }

  section.chart-slot{ display:block; padding-top:22px; }
  section:has([data-jarvis-empty]){ display:none; }

  /* ── 미니 위젯 — 리스트형 데이터 박스 (박스 배경/테두리 없이 라인만) ── */
  .mini-group{ display:flex; flex-direction:column; gap:12px; padding-top:22px; }
  .mini-group:empty{ display:none; padding-top:0; }
  .mini-group .mini-item{
    display:flex; align-items:center; gap:10px; font-size:14px; color:var(--ink);
    padding-bottom:10px; border-bottom:1px solid var(--grid);
  }
  .col-left .mini-group .mini-item{ justify-content:flex-end; }
  .col-right .mini-group .mini-item{ justify-content:flex-start; }
  .mini-group .mini-item .tag{ width:7px; height:7px; border-radius:2px; background:var(--a1); flex-shrink:0; }
  .mini-group .mini-item:nth-child(even) .tag{ background:var(--a2); }
  .mini-group .mini-item .val{ font-weight:800; color:var(--ink); }
  .mini-group .mini-item .lbl{ color:var(--muted); }

  /* ── 히어로 — 대형 3D 유리 토러스 (전체 폭 45~50%) ── */
  .hero-col{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:26px; }
  .hero-wrap{ position:relative; width:580px; height:580px; flex:0 0 auto; }

  .hero-glow{
    position:absolute; inset:-70px; z-index:0; border-radius:50%;
    background:
      radial-gradient(circle at 32% 30%, color-mix(in srgb, var(--a1s), transparent 45%), transparent 58%),
      radial-gradient(circle at 68% 70%, color-mix(in srgb, var(--a2s), transparent 45%), transparent 58%);
    filter:blur(18px);
  }

  .torus-shadow{
    position:absolute; left:50%; bottom:-6px; transform:translateX(-50%);
    width:360px; height:42px; border-radius:50%; z-index:0;
    background:radial-gradient(ellipse at center, color-mix(in srgb, var(--ink), transparent 78%) 0%, transparent 72%);
    filter:blur(8px);
  }

  .torus-ring{
    position:absolute; inset:0; z-index:1; border-radius:50%;
    background:
      repeating-conic-gradient(from 0deg, color-mix(in srgb, var(--a1s), transparent 10%) 0deg 6deg, transparent 6deg 18deg),
      conic-gradient(from 30deg,
        var(--a2) 0%, var(--a2s) 16%, var(--a1) 34%, var(--a1s) 50%,
        var(--a2) 66%, var(--a2s) 82%, var(--a1) 100%);
    -webkit-mask:radial-gradient(circle at 50% 50%, transparent 0 34%, #000 43% 100%);
            mask:radial-gradient(circle at 50% 50%, transparent 0 34%, #000 43% 100%);
    box-shadow:
      inset 0 0 46px rgba(255,255,255,.55),
      inset 0 -34px 60px rgba(0,0,0,.16),
      inset 0 0 0 1px rgba(255,255,255,.5);
    filter:
      saturate(1.08)
      drop-shadow(0 0 22px color-mix(in srgb, var(--a1), transparent 65%))
      drop-shadow(0 0 22px color-mix(in srgb, var(--a2), transparent 68%));
  }

  .torus-sheen{
    position:absolute; inset:0; z-index:1; border-radius:50%;
    background:linear-gradient(118deg,
      rgba(255,255,255,.9) 0%, rgba(255,255,255,0) 26%,
      rgba(255,255,255,0) 68%, rgba(255,255,255,.4) 100%);
    -webkit-mask:radial-gradient(circle at 50% 50%, transparent 0 34%, #000 43% 100%);
            mask:radial-gradient(circle at 50% 50%, transparent 0 34%, #000 43% 100%);
    mix-blend-mode:screen;
    pointer-events:none;
  }

  .torus-nodes{ position:absolute; inset:0; z-index:2; }
  .torus-nodes span{
    position:absolute; top:50%; left:50%;
    width:9px; height:9px; border-radius:2px; margin:-4.5px 0 0 -4.5px;
    background:var(--a1);
    box-shadow:0 0 7px color-mix(in srgb, var(--a1), transparent 25%);
    transform:rotate(calc(var(--i) * 22.5deg)) translate(195px) rotate(calc(var(--i) * -22.5deg));
  }
  .torus-nodes span:nth-child(even){
    background:var(--a2);
    box-shadow:0 0 7px color-mix(in srgb, var(--a2), transparent 25%);
  }

  /* ── 히어로 하단 라인 구분 통계 (박스 없음) ── */
  .hero-stats{ position:relative; z-index:2; display:flex; justify-content:center; }
  .hero-stats:empty{ display:none; }
  .hero-stats .stat{
    display:flex; flex-direction:column; align-items:center; gap:4px;
    padding:0 22px; border-left:1px solid var(--grid);
  }
  .hero-stats .stat:first-child{ border-left:none; }
  .hero-stats .stat .num{ font-size:24px; font-weight:800; color:var(--a1); line-height:1.1; }
  .hero-stats .stat:nth-child(even) .num{ color:var(--a2); }
  .hero-stats .stat .lbl{ font-size:14px; color:var(--muted); }

  /* ── 푸터 ── */
  .foot{
    position:relative; z-index:2;
    display:flex; justify-content:space-between; align-items:baseline; gap:24px;
    margin:40px 0 0; padding-top:16px; border-top:1px solid var(--grid);
  }
  .foot:not(:has(.source:not(:empty))):not(:has(.brand:not(:empty))){ display:none; }
  .source{ font-size:14px; color:var(--muted); }
  .source:empty{ display:none; }
  .brand{ font-size:14px; font-weight:600; letter-spacing:.05em; text-transform:uppercase; color:var(--eyebrow); }
  .brand:empty{ display:none; }
</style>
</head>
<body>
  <div class="stage">
    <span class="bokeh b1"></span>
    <span class="bokeh b2"></span>
    <span class="bokeh b3"></span>
    <span class="bokeh b4"></span>

    <header class="head">
      <p class="eyebrow">{EYEBROW}</p>
      <h1 class="title">{TITLE}</h1>
      <p class="subtitle">{SUBTITLE}</p>
    </header>

    <div class="canvas">
      <div class="col col-left">
        <div class="hud">
          <span class="node n-a1"></span>
          <section class="chart-slot">{CHART_1}</section>
        </div>
        <div class="hud">
          <span class="node n-a2"></span>
          <div class="mini-group">{MINI_CARDS}</div>
        </div>
      </div>

      <div class="hero-col">
        <div class="hero-wrap">
          <div class="hero-glow"></div>
          <div class="torus-shadow"></div>
          <div class="torus-ring"></div>
          <div class="torus-sheen"></div>
          <div class="torus-nodes">
            <span style="--i:0"></span><span style="--i:1"></span><span style="--i:2"></span><span style="--i:3"></span>
            <span style="--i:4"></span><span style="--i:5"></span><span style="--i:6"></span><span style="--i:7"></span>
            <span style="--i:8"></span><span style="--i:9"></span><span style="--i:10"></span><span style="--i:11"></span>
            <span style="--i:12"></span><span style="--i:13"></span><span style="--i:14"></span><span style="--i:15"></span>
          </div>
        </div>
        <div class="hero-stats">{HERO_STATS}</div>
      </div>

      <div class="col col-right">
        <div class="hud">
          <span class="node n-a2"></span>
          <section class="chart-slot">{CHART_2}</section>
        </div>
        <div class="hud">
          <span class="node n-a1"></span>
          <section class="chart-slot">{CHART_3}</section>
        </div>
      </div>
    </div>

    <footer class="foot">
      <span class="source">{SOURCE}</span>
      <span class="brand">{BRAND}</span>
    </footer>
  </div>
</body>
</html>
