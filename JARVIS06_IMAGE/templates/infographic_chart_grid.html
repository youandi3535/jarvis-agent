<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>{TITLE}</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

:root{
  --hero0:#F1E9D8;
  --hero1:#E8DCC3;
  --ink:#2A231C;
  --a1:#2C8C7A;
  --a1s:#E3A63E;
  --a2:#D85C46;
  --a2s:#5C3E82;
  --soft:#E3D9C2;
  --muted:#8C8071;
  --eyebrow:#9C7B3F;
  --grid:#DDD2B7;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  width:1280px;
  background:var(--hero0);
  color:var(--ink);
  font-family:'Noto Sans KR',sans-serif;
}

.hero-stats:empty,
.mini-cards:empty{display:none;}

section:has([data-jarvis-empty]){display:none;}

/* ---------- canvas ---------- */
.canvas{
  width:1280px;
  background:var(--hero0);
  padding:60px 72px 56px;
}

/* ---------- masthead ---------- */
.masthead{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:40px;
  margin-bottom:36px;
}
.brand{
  font-size:14px;
  font-weight:700;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--muted);
}
.eyebrow{
  font-size:13px;
  font-weight:700;
  letter-spacing:3px;
  text-transform:uppercase;
  color:var(--eyebrow);
  margin-bottom:16px;
}
.title-block{max-width:820px;}
.title-block h1{
  font-size:38px;
  font-weight:900;
  line-height:1.28;
  color:var(--ink);
  margin-bottom:14px;
}
.title-block .subtitle{
  font-size:16px;
  line-height:1.7;
  color:var(--muted);
  max-width:760px;
}

/* ---------- hero stats (flat, no card band) ---------- */
.hero-stats{
  display:flex;
  gap:44px;
  flex-wrap:wrap;
  padding-top:8px;
}
.hero-stats .stat{flex:0 0 auto;}

/* ---------- chart grid ---------- */
.grid-canvas{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  grid-template-rows:252px 208px 208px;
  gap:26px;
  margin-top:40px;
}

.chart-slot{
  background:transparent;
  border:none;
  box-shadow:none;
  border-radius:0;
  position:relative;
  overflow:hidden;
  display:flex;
  min-width:0;
  min-height:0;
}

/* cell 1 — top-left square (simplest chart, e.g. donut/pie) */
.cell-1{grid-column:1 / 2;grid-row:1 / 2;}

/* cell 2 — top wide (bar / dot-matrix, medium complexity) */
.cell-2{grid-column:2 / 5;grid-row:1 / 2;}
.cell-2::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:radial-gradient(var(--soft) 1.6px,transparent 1.6px);
  background-size:16px 16px;
  opacity:.55;
  z-index:0;
  pointer-events:none;
}
.cell-2 > *{position:relative;z-index:1;}

/* cell 3 — bottom-right, 2 cols x 2 rows (streamgraph, most complex) */
.cell-3{grid-column:3 / 5;grid-row:2 / 4;}

/* mini cards — bottom-left, small sub-charts + captions + legend (reference sheet) */
.mini-cards{
  grid-column:1 / 3;
  grid-row:2 / 4;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  grid-template-rows:repeat(2,1fr);
  gap:20px;
}
.mini-cards .mini-card{min-width:0;min-height:0;}
.mini-cards .mini-card .caption{
  font-size:14px;
  line-height:1.6;
  color:var(--muted);
}
.mini-cards .mini-card .legend-dot{
  display:inline-block;
  width:9px;
  height:9px;
  border-radius:50%;
  margin-right:6px;
}

/* ---------- footer ---------- */
.footer{
  margin-top:44px;
  padding-top:22px;
  border-top:1px solid var(--grid);
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.footer .source{font-size:13px;color:var(--muted);}
</style>
</head>
<body>

<div class="canvas">

  <div class="masthead">
    <div class="title-block">
      <p class="eyebrow">{EYEBROW}</p>
      <h1>{TITLE}</h1>
      <p class="subtitle">{SUBTITLE}</p>
    </div>
    <div class="brand">{BRAND}</div>
  </div>

  <div class="hero-stats">{HERO_STATS}</div>

  <div class="grid-canvas">
    <section class="chart-slot cell-1">{CHART_1}</section>
    <section class="chart-slot cell-2">{CHART_2}</section>
    <div class="mini-cards">{MINI_CARDS}</div>
    <section class="chart-slot cell-3">{CHART_3}</section>
  </div>

  <footer class="footer">
    <div class="source">{SOURCE}</div>
  </footer>

</div>

</body>
</html>
