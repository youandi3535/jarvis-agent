<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, initial-scale=1">
<title>{TITLE}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap');

  :root{
    --hero0: #ffffff;
    --hero1: #ffffff;
    --ink: #132a4c;
    --a1: #16345e;
    --a1s: #de6a34;
    --a2: #6e9bc4;
    --a2s: #f0954b;
    --soft: #eef2f6;
    --muted: #76839a;
    --eyebrow: #c1592b;
    --grid: #e1e6ed;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    padding:0;
    width:1280px;
    background:var(--hero0);
    font-family:'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  /* 단일 히어로 없음 — 전체 캔버스가 동일 위계 차트 타일로 채워진 풀-모자이크.
     카드·테두리·그림자·라운딩·배경장식 전부 없음. 순수 화이트 위에 색상 마크(막대/선/도넛/육각)만 존재. */
  .canvas{
    width:1280px;
    margin:0 auto;
    padding:56px 64px 48px;
    background:linear-gradient(180deg,var(--hero0),var(--hero1));
    display:flex;
    flex-direction:column;
  }

  .head{ flex:0 0 auto; }

  .eyebrow{
    font-size:14px;
    font-weight:700;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--eyebrow);
    margin:0 0 8px;
  }
  .eyebrow:empty{ display:none; margin:0; }

  .title{
    font-size:32px;
    font-weight:800;
    line-height:1.26;
    letter-spacing:-.01em;
    color:var(--ink);
    margin:0 0 8px;
  }
  .title:empty{ display:none; margin:0; }

  .subtitle{
    font-size:16px;
    font-weight:400;
    line-height:1.55;
    color:var(--muted);
    max-width:1000px;
    margin:0 0 8px;
  }
  .subtitle:empty{ display:none; margin:0; }

  /* ── 선택적 히어로 수치 — 미사용 시 자동 숨김 ── */
  .hero-stats{
    display:flex;
    flex-wrap:wrap;
    gap:32px;
    margin:20px 0 4px;
    padding-bottom:24px;
    border-bottom:1px solid var(--grid);
  }
  .hero-stats:empty{ display:none; margin:0; padding:0; border:0; }
  .hero-stats .stat{ display:flex; flex-direction:column; gap:4px; }
  .hero-stats .stat .num{ font-size:26px; font-weight:800; color:var(--ink); line-height:1.1; }
  .hero-stats .stat .lbl{ font-size:14px; color:var(--muted); }

  /* ── 풀-모자이크 그리드: 가로 6열 × 세로 5행, 셀 비대칭 병합 ──
     row1-2: 대형 도넛 / 스택 막대 / 라인 (각 2열×2행, 데이터 슬롯)
     row3   : 그룹 막대 / 영역차트 / 육각 다이어그램 (각 2열×1행, 카탈로그 장식 타일)
     row4-5 : 아이콘 범례 리스트 (전체 6열×2행) */
  .mosaic{
    flex:1 1 auto;
    display:grid;
    grid-template-columns:repeat(6, 1fr);
    grid-template-rows:214px 214px 148px 118px 118px;
    column-gap:28px;
    row-gap:0;
    grid-template-areas:
      "donut donut stack stack line line"
      "donut donut stack stack line line"
      "grouped grouped area area hex hex"
      "list list list list list list"
      "list list list list list list";
    margin-top:28px;
  }

  .tile{
    display:flex;
    flex-direction:column;
    padding:26px 6px 18px;
    border-top:1px solid var(--grid);
  }
  .tile-head{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    gap:10px;
    margin-bottom:14px;
  }
  .tile-label{
    font-size:14px;
    font-weight:700;
    letter-spacing:.04em;
    color:var(--muted);
    text-transform:uppercase;
  }
  .tile-body{ flex:1 1 auto; display:flex; align-items:center; justify-content:center; }

  /* 반복 캡션/범례 바 — 아이콘(색 스와치) 나열, 모든 타일 하단 공통 */
  .tile-cap{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:14px;
  }
  .tile-cap .swatch{
    width:10px;
    height:10px;
    border-radius:2px;
    flex-shrink:0;
  }

  /* ── 차트 슬롯 공통 — 빈 슬롯 자동 은폐 ── */
  section.chart-slot{ grid-area: inherit; }
  section.chart-slot:has([data-jarvis-empty]){ display:none; }

  /* ============ 1. 대형 % 도넛 (CHART_1) ============
     주입 마크업 예시:
       <div class="donut-big" style="--seg1:38%;--seg2:71%;">
         <div class="donut-center"><span class="num">38%</span><span class="lbl">항목A</span></div>
       </div>
       <div class="tile-cap">
         <span class="swatch" style="background:var(--a1)"></span>
         <span class="swatch" style="background:var(--a1s)"></span>
         <span class="swatch" style="background:var(--soft)"></span>
       </div>
  */
  .tile--donut{ grid-area:donut; }
  .donut-big{
    --seg1:38%;
    --seg2:71%;
    width:172px;
    height:172px;
    border-radius:50%;
    position:relative;
    background:conic-gradient(var(--a1) 0 var(--seg1), var(--a1s) var(--seg1) var(--seg2), var(--soft) var(--seg2) 100%);
  }
  .donut-big::after{
    content:"";
    position:absolute;
    inset:24px;
    border-radius:50%;
    background:var(--hero0);
  }
  .donut-center{
    position:absolute;
    inset:0;
    z-index:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
  }
  .donut-center .num{ font-size:30px; font-weight:900; color:var(--ink); line-height:1; }
  .donut-center .lbl{ font-size:13px; font-weight:500; color:var(--muted); margin-top:6px; }

  /* ============ 2. 스택형 막대그래프 (CHART_2) ============
     주입 마크업 예시(열 반복):
       <div class="stack-bar">
         <div class="stack-col">
           <div class="stack-seg" style="height:30%;background:var(--a1)"></div>
           <div class="stack-seg" style="height:20%;background:var(--a1s)"></div>
           <div class="stack-seg" style="height:14%;background:var(--a2)"></div>
         </div>
         ...
         <div class="stack-axis"></div>
       </div>
       <div class="tile-cap">
         <span class="swatch" style="background:var(--a1)"></span>
         <span class="swatch" style="background:var(--a1s)"></span>
         <span class="swatch" style="background:var(--a2)"></span>
       </div>
  */
  .tile--stack{ grid-area:stack; }
  .stack-bar{
    width:100%;
    height:172px;
    display:flex;
    align-items:flex-end;
    gap:16px;
    padding-bottom:1px;
    border-bottom:1px solid var(--grid);
  }
  .stack-col{
    flex:1;
    display:flex;
    flex-direction:column-reverse;
    height:100%;
    min-width:6px;
  }
  .stack-seg{ width:100%; }

  /* ============ 3. 꺾은선 그래프 (CHART_3) ============
     주입 마크업 예시:
       <div class="line-mini">
         <svg class="line-mini-plot" viewBox="0 0 320 160" preserveAspectRatio="none">
           <line class="lm-axis" x1="0" y1="150" x2="320" y2="150"/>
           <path class="lm-path lm-c1" d="M0,120 C70,110 140,60 210,40 C250,28 290,20 320,14"/>
           <path class="lm-path lm-c2" d="M0,138 C70,132 140,110 210,95 C250,86 290,74 320,68"/>
           <circle class="lm-dot lm-c1" cx="320" cy="14" r="5"/>
         </svg>
       </div>
       <div class="tile-cap">
         <span class="swatch" style="background:var(--a1)"></span>
         <span class="swatch" style="background:var(--a2)"></span>
       </div>
  */
  .tile--line{ grid-area:line; }
  .line-mini{ width:100%; }
  .line-mini-plot{ display:block; width:100%; height:168px; overflow:visible; }
  .lm-axis{ stroke:var(--grid); stroke-width:1.5; }
  .lm-path{ fill:none; stroke-width:3; stroke-linecap:round; stroke-linejoin:round; }
  .lm-c1{ stroke:var(--a1); }
  .lm-c2{ stroke:var(--a2); }
  .lm-c3{ stroke:var(--a1s); }
  .lm-c4{ stroke:var(--a2s); }
  .lm-dot{ stroke:var(--hero0); stroke-width:2; }
  circle.lm-dot.lm-c1{ fill:var(--a1); }
  circle.lm-dot.lm-c2{ fill:var(--a2); }

  /* ============ 4. 그룹 막대그래프 — 카탈로그 장식 타일 ============ */
  .tile--grouped{ grid-area:grouped; }
  .grouped-bars{
    width:100%;
    height:100%;
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:20px;
    padding-bottom:1px;
    border-bottom:1px solid var(--grid);
  }
  .grouped-set{
    flex:1;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    gap:5px;
    height:100%;
  }
  .grouped-set span{ flex:1; max-width:14px; }
  .grouped-set span:nth-child(1){ background:var(--a1); }
  .grouped-set span:nth-child(2){ background:var(--a1s); }
  .grouped-set span:nth-child(3){ background:var(--a2); }

  /* ============ 5. 영역(area) 차트 — 카탈로그 장식 타일 ============ */
  .tile--area{ grid-area:area; }
  .area-chart{ width:100%; }
  .area-chart-plot{ display:block; width:100%; height:100px; overflow:visible; }
  .area-fill{ fill:var(--a2); opacity:.28; }
  .area-line{ fill:none; stroke:var(--a1); stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }
  .area-axis{ stroke:var(--grid); stroke-width:1.5; }

  /* ============ 6. 육각형 다이어그램 — 카탈로그 장식 타일 ============ */
  .tile--hex{ grid-area:hex; }
  .hex-cluster{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
  }
  .hex{
    width:46px;
    height:40px;
    clip-path:polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
  }
  .hex:nth-child(odd){ margin-top:-18px; }
  .hex:nth-child(5n+1){ background:var(--a1); }
  .hex:nth-child(5n+2){ background:var(--a1s); }
  .hex:nth-child(5n+3){ background:var(--a2); }
  .hex:nth-child(5n+4){ background:var(--a2s); }
  .hex:nth-child(5n+5){ background:var(--soft); }

  /* ============ 7. 리스트형 아이콘 범례 (MINI_CARDS) ============ */
  .tile--list{ grid-area:list; border-top:1px solid var(--grid); }
  .tile--list:has(.mini-cards:empty){ display:none; }
  .mini-cards{
    width:100%;
    display:flex;
    flex-wrap:wrap;
    align-content:center;
    row-gap:16px;
    column-gap:40px;
  }
  .mini-cards:empty{ display:none; }
  .mini-cards .icon-item{
    flex:0 0 auto;
    display:flex;
    align-items:center;
    gap:12px;
  }
  .mini-cards .icon-item .ico{
    width:34px;
    height:34px;
    border-radius:50%;
    flex-shrink:0;
    background:var(--soft);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .mini-cards .icon-item .ico::after{
    content:"";
    width:12px;
    height:12px;
    border-radius:3px;
    background:var(--a1);
  }
  .mini-cards .icon-item:nth-child(4n+2) .ico::after{ background:var(--a1s); }
  .mini-cards .icon-item:nth-child(4n+3) .ico::after{ background:var(--a2); }
  .mini-cards .icon-item:nth-child(4n+4) .ico::after{ background:var(--a2s); }
  .mini-cards .icon-item .txt{ display:flex; flex-direction:column; gap:2px; }
  .mini-cards .icon-item .num{ font-size:20px; font-weight:800; color:var(--ink); line-height:1.1; }
  .mini-cards .icon-item .lbl{ font-size:14px; color:var(--muted); }

  /* ── 푸터 ── */
  .foot{
    flex:0 0 auto;
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    gap:24px;
    margin:32px 0 0;
    padding-top:16px;
    border-top:1px solid var(--grid);
  }
  .foot:not(:has(.source:not(:empty))):not(:has(.brand:not(:empty))){ display:none; }
  .source{ font-size:14px; color:var(--muted); }
  .source:empty{ display:none; }
  .brand{ font-size:14px; font-weight:600; letter-spacing:.05em; text-transform:uppercase; color:var(--eyebrow); }
  .brand:empty{ display:none; }
</style>
</head>
<body>
  <div class="canvas">
    <header class="head">
      <p class="eyebrow">{EYEBROW}</p>
      <h1 class="title">{TITLE}</h1>
      <p class="subtitle">{SUBTITLE}</p>
    </header>

    <div class="hero-stats">{HERO_STATS}</div>

    <div class="mosaic">
      <section class="tile tile--donut chart-slot">
        <div class="tile-head"><span class="tile-label"></span></div>
        <div class="tile-body">{CHART_1}</div>
      </section>

      <section class="tile tile--stack chart-slot">
        <div class="tile-head"><span class="tile-label"></span></div>
        <div class="tile-body">{CHART_2}</div>
      </section>

      <section class="tile tile--line chart-slot">
        <div class="tile-head"><span class="tile-label"></span></div>
        <div class="tile-body">{CHART_3}</div>
      </section>

      <div class="tile tile--grouped">
        <div class="tile-body">
          <div class="grouped-bars">
            <div class="grouped-set"><span style="height:52%"></span><span style="height:78%"></span><span style="height:36%"></span></div>
            <div class="grouped-set"><span style="height:64%"></span><span style="height:44%"></span><span style="height:82%"></span></div>
            <div class="grouped-set"><span style="height:40%"></span><span style="height:70%"></span><span style="height:58%"></span></div>
            <div class="grouped-set"><span style="height:86%"></span><span style="height:50%"></span><span style="height:30%"></span></div>
          </div>
        </div>
        <div class="tile-cap">
          <span class="swatch" style="background:var(--a1)"></span>
          <span class="swatch" style="background:var(--a1s)"></span>
          <span class="swatch" style="background:var(--a2)"></span>
        </div>
      </div>

      <div class="tile tile--area">
        <div class="tile-body">
          <div class="area-chart">
            <svg class="area-chart-plot" viewBox="0 0 400 100" preserveAspectRatio="none">
              <line class="area-axis" x1="0" y1="94" x2="400" y2="94"/>
              <path class="area-fill" d="M0,80 C60,70 110,40 170,36 C230,32 290,52 340,42 C370,36 390,30 400,26 L400,94 L0,94 Z"/>
              <path class="area-line" d="M0,80 C60,70 110,40 170,36 C230,32 290,52 340,42 C370,36 390,30 400,26"/>
            </svg>
          </div>
        </div>
        <div class="tile-cap">
          <span class="swatch" style="background:var(--a1)"></span>
          <span class="swatch" style="background:var(--a2)"></span>
        </div>
      </div>

      <div class="tile tile--hex">
        <div class="tile-body">
          <div class="hex-cluster">
            <div class="hex"></div>
            <div class="hex"></div>
            <div class="hex"></div>
            <div class="hex"></div>
            <div class="hex"></div>
          </div>
        </div>
        <div class="tile-cap">
          <span class="swatch" style="background:var(--a1)"></span>
          <span class="swatch" style="background:var(--a1s)"></span>
          <span class="swatch" style="background:var(--a2s)"></span>
        </div>
      </div>

      <div class="tile tile--list">
        <div class="mini-cards">{MINI_CARDS}</div>
      </div>
    </div>

    <footer class="foot">
      <span class="source">{SOURCE}</span>
      <span class="brand">{BRAND}</span>
    </footer>
  </div>
</body>
</html>
